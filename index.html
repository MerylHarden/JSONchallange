<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JSONPlaceholder Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .post {
      background: white;
      padding: 16px;
      margin-bottom: 12px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .post h3 {
      margin: 0 0 8px;
    }

    .post p {
      margin: 0;
      color: #444;
    }

    button {
      display: block;
      margin: 20px auto;
      padding: 10px 16px;
      border: none;
      background: #333;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Posts from JSONPlaceholder</h1>

  <div class="container">
    <button onclick="loadPosts()">Load Posts</button>
    <div id="posts"></div>
  </div>

  <script>
    async function loadPosts() {
      const container = document.getElementById("posts");
      container.innerHTML = "Loading...";

      try {
        const response = await fetch("https://jsonplaceholder.typicode.com/posts");
        const data = await response.json();

        container.innerHTML = "";

        data.slice(0, 10).forEach(post => {
          const div = document.createElement("div");
          div.className = "post";

          div.innerHTML = `
            <h3>${post.title}</h3>
            <p>${post.body}</p>
          `;

          container.appendChild(div);
        });

      } catch (error) {
        container.innerHTML = "Failed to load data.";
      }
    }
  </script>

</body>
</html>
